<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=">
    <title>REGISTER</title>
</head>

<body>
    <H1>STC REGISTRATION PAGE</H1>
    <style>
        * {
            background-color: aqua;
            font-size: 30px;
        }

        h1 {
            display: flex;
            justify-self: center;
            font-size: 50px;
            text-shadow: 5px 4px 8px black;
        }

        input {
            background-color: aliceblue;
        }

        .class {
            background-color: aliceblue;
        }

        .v {
            display: flex;
            justify-self: center;
        }
    </style>
    <form>
        <SEction>
            <div class="name">
                ENTER YOUR NAME:
                <input type="text" name="" id="">
            </div>
            <br>
            <div>
                ENTER YOUR GENDER:
                <input type="radio" id="male" name="gender">
                <label for="male">male</label>
                <input type="radio" id="female" name="gender">
                <label for="female">female</label>
            </div>
            <br>
            <div>
                <h2>SELECT YOUR CLASS</h2>
                <select class="class" name="class" id="class">
                    <option value="class 6">class 6</option>
                    <option value="class 7">class 7</option>
                    <option value="class 8">class 8</option>
                    <option value="class 9">class 9</option>
                    <option value="class 10">class 10</option>
                </select>
            </div>

            <section>
                <div>
                    <input type="checkbox" name="to know" id="information">
                    <label for="information">please make sure that you are interested</label>
                </div>
            </section>
            <div>
                <h1>TO REGISTER WE REQURIE SOME INFORMATION</h1>
            </div>
            <div>
                <h2>ENTER YOUR LAST YEARS SUBJECT MARKS</h2>
            </div>
            <div>
                <label for="/">enter your science marks:</label>
                <input type="number" name="" id="/">
            </div>
            <br>
            <div>
                <label for="p">enter your maths marks:</label>
                <input type="number" id="p">
            </div>
            <br>
            <div>
                <label for="c">enter your kannada marks:</label>
                <input type="number" id="c">
            </div>
            <br>
            <div>
                <h3>
                    your parents sign
                </h3>
            </div>
            <br>
            <div>
                <label for="father">father sign :</label>
                <input type="text" id="father">
            </div>
            <br>
            <div>
                <label for="mother">mother sign :</label>
                <input type="text" id="mother">
            </div>
            <br>
            <div>
                <button class="v">
                    <label for="p">you can also submit in a application form</label>
                    <a href="application form.jpeg"></a>
                </button>
            </div>
            <div class="convey">
                <nav>
                    <h5>
                        IF YOUR APPLICATION FILLING IS COMPLITED YOU CAN SUBMIT
                    </h5>
                </nav>
            </div>
            <br>
            <section>
                <button class="button">
                    SUBMIT
                </button>
            </section>
            <br>
            <div class="mark">
                <mark>************************THANK YOU***********************</mark>
            </div>
            <style>
                .convey {
                    display: flex;
                    justify-self: center;
                    text-shadow: 2px 3px 4px black;
                }

                .button {
                    display: flex;
                    justify-self: center;
                    border-radius: 10px;
                    box-shadow: 3px 4px 4px black;
                    background-color: red;
                }

                .mark {
                    display: flex;
                    justify-self: center;
                }
            </style>
        </SECtion>
    </form>
</body>

</html>
