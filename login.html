<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STC LOGIN PAGE</title>
</head>
<body>
    <style>
        *
        {
            background-color:darkslategrey;
        }
        .h1{
            display: flex;
            justify-self: center;
            font-family:bold;
            text-shadow: 2px 3px 4px black;
        }
        .h3{
            display: flex;
            justify-self: center;
        }
        .input{
            display: inline-block;
            color:white;
        }
    </style>
    <section class="top">
        <nav>
            <div>
                <h2 class="h1">
                    LOGIN HERE!
                </h2>
            </div>
        </nav>
        <div class="h3">
            <h3>ENTER YOUR NUMBER:</h3>
            <input type="number" class="input">
        </div>
    </section>
    <style>
        .top{
            background-color: aqua;
        }
    </style>
</body>
</html>
